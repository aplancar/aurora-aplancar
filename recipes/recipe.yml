---
# yaml-language-server: $schema=https://schema.blue-build.org/recipe-v1.json
# image will be published to ghcr.io/aplancar/aurora-aplancar
name: aurora-aplancar
description: My personal Aurora build with NordVPN and flatpaks
base-image: ghcr.io/ublue-os/aurora-dx-nvidia-open
image-version: latest

modules:
  - type: files
    files:
      - source: system
        destination: /

  - type: dnf
    repos:
      copr:
        - atim/starship
      keys:
        - https://repo.nordvpn.com/gpg/nordvpn_public.asc
      files:
        - nordvpn.repo
    install:
      packages:
        - nordvpn
        - starship
        - neovim
    remove:
      packages:
        - firefox
        - firefox-langpacks

  - type: script
    scripts:
      - nordvpn-group.sh

  - type: systemd
    system:
      enabled:
        - nordvpnd.service

  - type: default-flatpaks
    configurations:
      - notify: true
        scope: system
        install:
          - org.mozilla.firefox
          - com.nordpass.NordPass
      - scope: user

  - type: signing