---
# yaml-language-server: $schema=https://schema.blue-build.org/recipe-v1.json
# image will be published to ghcr.io/aplancar/aurora-aplancar
name: aurora-aplancar
description: My personal Aurora build with NordVPN and flatpaks
base-image: ghcr.io/ublue-os/aurora-dx-nvidia-open
image-version: latest

modules:
  - type: files
    files:
      - source: system
        destination: / # copies files/system/* (* means everything inside it) into your image's root folder /
      - source: zshrc
        destination: /etc/skel/.zshrc   # ships a default zshrc for new users; for your own user, symlink from your dotfiles repo instead

  - type: dnf
    repos:
      copr:
        - atim/starship
      keys:
        - https://repo.nordvpn.com/gpg/nordvpn_public.asc
      files:
        - nordvpn.repo
    install:
      packages:
        - nordvpn
        - starship
        - neovim
        - zsh
        - zsh-autosuggestions
        - zsh-syntax-highlighting
        - util-linux-user
        - kitty
    remove:
      packages:
        - firefox
        - firefox-langpacks

  - type: script
    scripts:
      - nordvpn-group.sh
      - set-default-shell.sh   # runs chsh or sets it via /etc/passwd during build if you want it default without manual chsh

  - type: systemd
    system:
      enabled:
        - nordvpnd.service

  - type: default-flatpaks
    configurations:
      - notify: true # Send notification after install/uninstall is finished (true/false)
        scope: system
        # If no repo information is specified, Flathub will be used by default
        install: # system flatpaks we want all users to have and not remove
          - org.mozilla.firefox
          - com.nordpass.NordPass
          - com.valvesoftware.Steam
      - scope: user # Also add Flathub user repo, but no user packages

  - type: kargs
    kargs:
      - i915.enable_dpcd_backlight=3 # Fix for ROG laptop backlight not working on Linux

  - type: signing # this sets up the proper policy & signing files for signed images to work fully
